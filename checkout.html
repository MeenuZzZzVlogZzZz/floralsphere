<!DOCTYPE html>
<html>
<head>
    <title>Payment - Floral Sphere</title>
    <link rel="stylesheet" href="style.css">

    <meta name="viewport" content="width=device-width,initial-scale=1.0">
</head>
<body style="background: #f4f7f6;">
    <div style="max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;">
        <h2 style="color: #4b4f7c;">Secure Checkout</h2>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <div id="order-review" style="text-align: left; margin-bottom: 20px;">
            </div>

        <div style="background: #eef9f2; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <p style="margin: 0; color: #27ae60; font-weight: bold;">Step 1: Confirm Order Details</p>
            <p style="margin: 5px 0 0; font-size: 13px; color: #666;">We will finalize your custom paper craft order on WhatsApp.</p>
        </div>

        <div id="order-summary" style="text-align: left; background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee;">
            <h3 style="font-family: 'Dancing Script', cursive;">Order Summary</h3>
            <div id="items-list"></div>
            <hr>
            <p><strong>Total to Pay: <span id="final-amount">₹0</span></strong></p>
        </div>

        <div id="payment-area" style="margin-bottom: 20px;"></div>

        <button onclick="finalWhatsAppPay()" style="width: 100%; background: #25D366; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer;">
            Confirm & Share Screenshot on WhatsApp 📱
        </button>

    </div>

    <script>
        function showPaymentOptions() {
            const total = calculateTotal(); // Make sure this helper function is in your script
            const upiID = "yourname@okicici"; // Replace with your actual UPI ID
    
            const paymentHTML =`
                <div style="border: 2px solid #4b4f7c; padding: 20px; border-radius: 15px; background: #f8f9ff;">
                    <p>Please pay <strong>₹${total}</strong> to:</p>
                    <h3 style="color: #4b4f7c;">${upiID}</h3>
                    <p style="font-size: 12px; color: #777;">(Take a screenshot of the payment to share on WhatsApp)</p>
                </div>
            `;
            document.getElementById("payment-area").innerHTML = paymentHTML;
        }

        function finalWhatsAppPay() {
            const btn = event.target;
            btn.innerText = "Processing Order... 🌸";
            btn.style.background = "#bdc3c7";
            btn.disabled = true;

            setTimeout(() => {
                let cart = JSON.parse(localStorage.getItem("cart")) || [];
                let note = localStorage.getItem("orderNote") || "";
                let total = 0;
                let message = "🛍️ *New Order from Floral Sphere*\n\n";

                cart.forEach(item => {
                    message += `• ${item.name} x${item.qty} - ₹${item.price * item.qty}\n`;
                    total += (item.price * item.qty);
                });

                message += `\n*Grand Total: ₹${total}*`;
                if(note) message += `\n\n*Note:* ${note}`;

                const phone = "919207693271";
                window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
        
                localStorage.removeItem("cart");
                localStorage.removeItem("orderNote");
            }, 1500);
        }
        function loadPaymentDetails() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let total = 0;
            let itemsHtml = "";

            cart.forEach(item => {
                total += (item.price * item.qty);
                itemsHtml += `<p style="font-size: 14px; margin: 5px 0;">${item.name} x ${item.qty}</p>`;
            });

            document.getElementById("items-list").innerHTML = itemsHtml;
            document.getElementById("final-amount").innerText = "₹" + total;

            const upiID = "sanjaysajukumar@oksbi"; // CHANGE THIS to your actual UPI ID
    
            const upiHTML =` 
                <div style="background: #f8f9ff; border: 2px dashed #4b4f7c; padding: 20px; border-radius: 15px; text-align: center;">
                <p style="margin-bottom: 10px; font-weight: bold; color: #4b4f7c;">Pay using UPI</p>
                <div style="background: white; padding: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd;">
                <span id="upi-text" style="font-size: 18px; font-weight: bold;">${upiID}</span>
                <button onclick="copyUPI()" style="background: #4b4f7c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px;">Copy</button>
                </div>
                <p style="font-size: 12px; color: #666;">Copy the ID, pay in your app, and share the screenshot!</p>
                </div>
                <img src="upi-qr.png" width="150" style="margin: 10px auto;">

            `;
            document.getElementById("payment-area").innerHTML = upiHTML;
        }

        window.onload = loadPaymentDetails;

        function copyUPI() {
            const upiText = document.getElementById("upi-text").innerText;
            navigator.clipboard.writeText(upiText).then(() => {
                alert("UPI ID copied to clipboard!");
            });
        }
    </script>
</body>
</html>
